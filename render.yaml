# Render Blueprint - one-click deploy for Lex Token Server
# https://render.com/docs/blueprint-spec
services:
  - type: web
    name: lex-token-server
    runtime: python
    buildCommand: pip install -r requirements-server.txt
    startCommand: gunicorn token_server:app --worker-class uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
      - key: GOOGLE_API_KEY
        sync: false
      - key: MEM0_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: MEMORY_USER_ID
        sync: false
      - key: LEX_ENABLE_INITIAL_GREETING
        value: "1"
      - key: PYTHON_VERSION
        value: "3.12.0"
